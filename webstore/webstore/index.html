<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopNow — Electronics & More</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <nav class="navbar" id="main-nav">
      <div class="navbar-inner">
        <a class="logo" href="#">Shop<span>Now</span></a>

        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="search" id="search-input" placeholder="Search products..." />
        </div>

        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">Products</a></li>
          <li><a href="#">Deals</a></li>
          <li><a href="#">About</a></li>
        </ul>

        <div class="cart-btn-wrap">
          <button id="cart-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            Cart
            <span id="cart-count"></span>
          </button>
        </div>

        <button id="menu-toggle" aria-label="Toggle menu">☰</button>
      </div>
    </nav>
  </header>


  <div id="cart-overlay"></div>
  <aside id="cart-panel">
    <div class="cart-header">
      <h2>Shopping Cart</h2>
      <button id="cart-close">✕</button>
    </div>
    <div id="cart-body"></div>
    <div id="cart-footer"></div>
  </aside>


  <main>
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="#">Home</a>
      <span class="sep">›</span>
      <a href="#">Products</a>
      <span class="sep">›</span>
      <span class="current" id="breadcrumb-category">Electronics</span>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
      <h1 id="page-title">Electronics</h1>
      <div class="header-controls">
        <button class="controls-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
          </svg>
          Filters
        </button>
        <select id="sort-select" aria-label="Sort products">
          <option value="default">↕ Sort</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
    </div>

    <div class="filter-section">
      <div id="filter-bar" role="group" aria-label="Category filter"></div>
    </div>

    <section class="products-section" aria-label="Product listing">
      <div id="product-grid"></div>
    </section>
  </main>

  <section id="newsletter-section"></section>

  <footer>
    <p>© 2025 ShopNow. All rights reserved. Made with ❤️</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
